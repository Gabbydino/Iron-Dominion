<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dungeon Shooter</title>
<style>
  :root{
    --stone-dark:#221d17;
    --stone-mid:#4a4032;
    --torch:#ff8c3c;
    --blood:#7a1f1f;
    --parchment:#d8c9a3;
    --parchment-light:#e9dcb8;
    --shadow:#0d0b08;
    --gold:#c79a4b;
    --gold-bright:#f0c877;
    --iron:#3a3128;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;
    font-family:'Luminari','Cinzel Decorative',Cinzel,'Trajan Pro',Georgia,'Times New Roman',serif;}
  canvas{display:block;}

  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 45%, rgba(5,3,1,0.75) 100%);
    mix-blend-mode:multiply;
  }
  #torchglow{
    position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(ellipse at center, rgba(255,140,60,0.10) 0%, rgba(0,0,0,0) 55%);
    animation:flicker 2.6s infinite ease-in-out;
  }
  @keyframes flicker{
    0%,100%{opacity:.7;} 20%{opacity:1;} 35%{opacity:.55;} 50%{opacity:.95;} 70%{opacity:.6;} 85%{opacity:.9;}
  }
  #hitflash{
    position:fixed;inset:0;pointer-events:none;z-index:6;background:rgba(140,10,10,0.0);
    transition:background .12s ease-out;
  }

  /* ---------- Iron corner brackets framing the whole viewport ---------- */
  .screenCorner{
    position:fixed;width:64px;height:64px;z-index:6;pointer-events:none;opacity:.55;
  }
  .screenCorner svg{width:100%;height:100%;}
  #corner-tl{top:10px;left:10px;}
  #corner-tr{top:10px;right:10px;transform:scaleX(-1);}
  #corner-bl{bottom:10px;left:10px;transform:scaleY(-1);}
  #corner-br{bottom:10px;right:10px;transform:scale(-1,-1);}

  /* ---------- Crosshair: crossed blades ---------- */
  #crosshair{
    position:fixed;left:50%;top:50%;width:30px;height:30px;transform:translate(-50%,-50%);
    z-index:7;pointer-events:none;
    filter:drop-shadow(0 0 3px rgba(0,0,0,.9));
  }
  #crosshair svg{width:100%;height:100%;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;z-index:8;pointer-events:none;}

  .ornate{
    position:relative;
    background:
      radial-gradient(circle at 13px 13px, var(--gold) 0 2.4px, transparent 3.2px),
      radial-gradient(circle at calc(100% - 13px) 13px, var(--gold) 0 2.4px, transparent 3.2px),
      radial-gradient(circle at 13px calc(100% - 13px), var(--gold) 0 2.4px, transparent 3.2px),
      radial-gradient(circle at calc(100% - 13px) calc(100% - 13px), var(--gold) 0 2.4px, transparent 3.2px),
      linear-gradient(180deg,#342c1f,#160f0a);
    border:2px solid var(--gold);
    border-radius:3px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.6), inset 0 0 18px rgba(0,0,0,.55), 0 6px 16px rgba(0,0,0,.6);
  }

  #healthWrap{
    position:absolute;left:22px;bottom:22px;width:290px;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.7));
  }
  #healthBanner{
    clip-path:polygon(0% 18%, 5% 0%, 95% 0%, 100% 18%, 100% 82%, 95% 100%, 5% 100%, 0% 82%);
    padding:9px 16px 8px 16px;
  }
  #healthLabel{
    display:flex;align-items:center;gap:6px;color:var(--gold-bright);font-size:12px;
    letter-spacing:3px;text-transform:uppercase;opacity:.92;margin-bottom:5px;
  }
  #healthLabel svg{width:14px;height:14px;flex:none;}
  #healthBarOuter{
    width:100%;height:17px;background:#120c08;position:relative;
    border:1px solid var(--iron);box-shadow:inset 0 0 6px rgba(0,0,0,.85), 0 0 0 1px rgba(199,154,75,.35);
  }
  #healthBarInner{
    height:100%;width:100%;
    background:repeating-linear-gradient(135deg,#c23a3a 0 6px,#a52c2c 6px 12px),
               linear-gradient(180deg,#d94f4f,#6b1414);
    background-blend-mode:overlay;
    transition:width .25s ease-out;
  }
  #healthWrap.critical #healthBarInner{animation:pulseRed 0.9s infinite;}
  @keyframes pulseRed{0%,100%{filter:brightness(1);} 50%{filter:brightness(1.6);}}
  #healthText{position:absolute;right:6px;top:0;color:#f5ead0;font-size:12px;line-height:17px;
    text-shadow:0 1px 2px #000;}

  #statsPlaque{
    position:absolute;right:22px;top:22px;padding:10px 20px;text-align:right;color:var(--parchment);
  }
  #statsPlaque div{
    display:flex;align-items:center;justify-content:flex-end;gap:7px;
    font-size:14px;letter-spacing:2px;text-transform:uppercase;margin:3px 0;
  }
  #statsPlaque svg{width:15px;height:15px;flex:none;}
  #statsPlaque span{color:var(--gold-bright);font-weight:bold;}

  #waveBanner{
    position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);
    display:flex;align-items:center;gap:14px;
    opacity:0;transition:opacity .5s ease;text-align:center;
  }
  #waveBanner.show{opacity:1;}
  #waveBanner svg{width:26px;height:34px;opacity:.8;}
  #waveBanner .txt{
    color:#ffdca8;font-size:36px;letter-spacing:6px;text-transform:uppercase;
    text-shadow:0 0 14px rgba(255,140,60,.85), 0 3px 4px #000;
  }
  #waveBanner .sub{display:block;font-size:14px;letter-spacing:3px;color:#d8c9a3;margin-top:6px;opacity:.85;
    text-transform:none;font-family:Georgia,serif;}

  /* ---------- Overlays ---------- */
  .overlay{
    position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center, rgba(30,22,14,0.92) 0%, rgba(5,3,1,0.97) 100%);
    flex-direction:column;text-align:center;color:var(--parchment);
  }
  .hidden{display:none !important;}

  .flourish{color:var(--gold);font-size:20px;letter-spacing:10px;opacity:.75;margin-bottom:6px;}
  .title{
    font-size:58px;letter-spacing:8px;color:#e7c88a;text-transform:uppercase;
    text-shadow:0 1px 0 #000, 0 2px 2px rgba(0,0,0,.9), 0 0 24px rgba(255,140,60,.55);
    margin:0 0 6px 0;
  }
  .subtitle{
    font-size:14px;letter-spacing:5px;color:#a58a5c;text-transform:uppercase;margin-bottom:30px;
    display:flex;align-items:center;gap:14px;
  }
  .subtitle::before,.subtitle::after{content:"";width:46px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

  .panel{
    padding:28px 44px;max-width:480px;box-shadow:0 12px 34px rgba(0,0,0,.65);
  }
  .panel::before{
    content:"";position:absolute;inset:8px;border:1px solid rgba(199,154,75,.35);border-radius:2px;pointer-events:none;
  }
  .panel p{
    font-size:14px;line-height:2;color:#c9b98f;margin:7px 0;letter-spacing:.4px;font-family:Georgia,'Times New Roman',serif;
  }
  .divider{color:var(--gold);letter-spacing:12px;font-size:13px;margin:14px 0;opacity:.65;}
  .key{
    display:inline-block;border:1px solid var(--gold);border-radius:3px;padding:2px 8px;
    color:#ffdca8;background:linear-gradient(180deg,#2c2416,#160f0a);font-size:12px;margin:0 2px;
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 2px 3px rgba(0,0,0,.6);
  }
  .btn{
    position:relative;margin-top:24px;padding:13px 38px;
    background:linear-gradient(180deg,#7a2b1f,#3d1108);
    border:2px solid var(--gold);color:#f5ddb8;font-size:15px;letter-spacing:3px;text-transform:uppercase;
    cursor:pointer;border-radius:3px;font-family:inherit;
    box-shadow:0 5px 14px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.5);
    transition:box-shadow .2s ease, transform .1s ease;
  }
  .btn:hover{
    background:linear-gradient(180deg,#8f3524,#4a140c);
    box-shadow:0 0 18px rgba(255,140,60,.55), 0 5px 14px rgba(0,0,0,.55);
  }
  .btn:active{transform:translateY(1px);}
  #gameOverTitle{font-size:46px;color:#c23a3a;letter-spacing:6px;text-transform:uppercase;
    text-shadow:0 0 18px rgba(194,58,58,.7),0 4px 6px #000;margin-bottom:8px;}
  #finalStats{font-size:15px;color:#e7c88a;letter-spacing:2px;margin-bottom:6px;font-family:Georgia,serif;}
</style>
</head>
<body>

<!-- reusable iconography -->
<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <g id="icon-shield">
      <path d="M12 2 L21 5.5 V11.5 C21 17 17 20.5 12 22 C7 20.5 3 17 3 11.5 V5.5 Z"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
      <path d="M12 5.2 V18.5 M7 9 L12 12 L17 9" fill="none" stroke="currentColor" stroke-width="1.1" opacity=".8"/>
    </g>
    <g id="icon-coin">
      <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="12" cy="12" r="5.2" fill="none" stroke="currentColor" stroke-width="1"/>
      <path d="M12 8.4 V15.6 M9.6 10 h4.8" stroke="currentColor" stroke-width="1"/>
    </g>
    <g id="icon-skull">
      <path d="M12 2.5c-4.4 0-7.6 3.2-7.6 7.2 0 2.6 1.3 4.4 2.6 5.6v2.6c0 .6.5 1.1 1.1 1.1h1.1v1.4c0 .5.4.9.9.9h3.8c.5 0 .9-.4.9-.9v-1.4h1.1c.6 0 1.1-.5 1.1-1.1v-2.6c1.3-1.2 2.6-3 2.6-5.6 0-4-3.2-7.2-7.6-7.2z"
        fill="none" stroke="currentColor" stroke-width="1.4"/>
      <circle cx="9" cy="10.5" r="1.3" fill="currentColor"/>
      <circle cx="15" cy="10.5" r="1.3" fill="currentColor"/>
      <path d="M10.6 14.5 h2.8" stroke="currentColor" stroke-width="1.1"/>
    </g>
    <g id="icon-scroll">
      <path d="M4 5c0-1.4 1.6-2.3 3-1.7 M4 5v13c0 1.5 1.5 2.5 3 1.7 M4 5h13.5 M17 3.3c1.4-.6 3 .3 3 1.7v13c0 1.4-1.6 2.3-3 1.7M20 5v13M7 4v16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </g>
    <g id="icon-swords">
      <path d="M3 21 L15 9 M13 7 L17 3 L20 4 L21 7 L17 11 L15 9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M21 21 L9 9 M11 7 L7 3 L4 4 L3 7 L7 11 L9 9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g id="icon-corner">
      <path d="M2 62 V16 Q2 2 16 2 H62" fill="none" stroke="#c79a4b" stroke-width="2.4"/>
      <path d="M2 40 Q2 22 22 22" fill="none" stroke="#c79a4b" stroke-width="1.2" opacity=".7"/>
      <circle cx="16" cy="16" r="3.4" fill="#c79a4b"/>
      <path d="M16 16 q10 -2 6 -12" fill="none" stroke="#c79a4b" stroke-width="1" opacity=".6"/>
    </g>
  </defs>
</svg>

<div id="vignette"></div>
<div id="torchglow"></div>
<div id="hitflash"></div>

<div class="screenCorner" id="corner-tl"><svg viewBox="0 0 64 64"><use href="#icon-corner"/></svg></div>
<div class="screenCorner" id="corner-tr"><svg viewBox="0 0 64 64"><use href="#icon-corner"/></svg></div>
<div class="screenCorner" id="corner-bl"><svg viewBox="0 0 64 64"><use href="#icon-corner"/></svg></div>
<div class="screenCorner" id="corner-br"><svg viewBox="0 0 64 64"><use href="#icon-corner"/></svg></div>

<div id="crosshair">
  <svg viewBox="0 0 24 24" fill="none" stroke="#e9dcb8" stroke-width="1.6">
    <use href="#icon-swords"/>
    <circle cx="12" cy="12" r="1.6" fill="#c23a3a" stroke="none"/>
  </svg>
</div>

<div id="hud">
  <div id="healthWrap">
    <div id="healthBanner" class="ornate">
      <div id="healthLabel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#icon-shield"/></svg>Vida</div>
      <div id="healthBarOuter">
        <div id="healthBarInner"></div>
        <div id="healthText">100</div>
      </div>
    </div>
  </div>
  <div id="statsPlaque" class="ornate">
    <div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#icon-coin"/></svg>Pontos: <span id="scoreVal">0</span></div>
    <div><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><use href="#icon-skull"/></svg>Horda: <span id="waveVal">1</span></div>
  </div>
  <div id="waveBanner">
    <svg viewBox="0 0 24 24" fill="none" stroke="#c79a4b"><use href="#icon-scroll"/></svg>
    <div><span class="txt">Horda 1</span><span class="sub">Prepare-se</span></div>
    <svg viewBox="0 0 24 24" fill="none" stroke="#c79a4b" style="transform:scaleX(-1)"><use href="#icon-scroll"/></svg>
  </div>
</div>

<div class="overlay" id="startScreen">
  <div class="flourish">❖ ❖ ❖</div>
  <div class="title">Dungeon Shooter</div>
  <div class="subtitle">uma masmorra medieval te espera</div>
  <div class="panel ornate">
    <p><span class="key">W A S D</span> mover</p>
    <p><span class="key">Mouse</span> olhar &nbsp; <span class="key">Clique</span> atirar besta</p>
    <p><span class="key">ESC</span> pausar</p>
    <div class="divider">❖</div>
    <p>Sobreviva às hordas de esqueletos nas profundezas do calabouço.</p>
  </div>
  <button class="btn" id="startBtn">Entrar na Masmorra</button>
</div>

<div class="overlay hidden" id="pauseScreen">
  <div class="flourish">❖</div>
  <div class="title" style="font-size:38px;">Pausado</div>
  <button class="btn" id="resumeBtn">Continuar</button>
</div>

<div class="overlay hidden" id="gameOverScreen">
  <div class="flourish">❖ ❖ ❖</div>
  <div id="gameOverTitle">Você Morreu</div>
  <div id="finalStats">Pontos finais: 0 &nbsp;|&nbsp; Horda alcançada: 1</div>
  <button class="btn" id="restartBtn">Tentar Novamente</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

/* ---------- MAZE LAYOUT ---------- */
const GRID = [
"#############",
"#....#.....E#",
"#.##.#.###.##",
"#.#..#...#..#",
"#.#.###.##.T#",
"#.#.....#...#",
"#.###.#.#.###",
"#...#.#...#E#",
"#.#.#.###.#.#",
"#P#.......#.#",
"#############"
];
const CELL = 4;
const WALL_H = 4.6;
const ROWS = GRID.length;
const COLS = GRID[0].length;

function cellAt(row,col){
  if(row<0||row>=ROWS||col<0||col>=COLS) return '#';
  return GRID[row][col];
}
function isWallWorld(x,z){
  const col = Math.floor(x/CELL);
  const row = Math.floor(z/CELL);
  return cellAt(row,col) === '#';
}

let playerStart = {x:6,z:38};
let enemySpawns = [];
let torchSpots = [];
for(let r=0;r<ROWS;r++){
  for(let c=0;c<COLS;c++){
    const ch = GRID[r][c];
    const wx = c*CELL+CELL/2, wz = r*CELL+CELL/2;
    if(ch==='P') playerStart = {x:wx,z:wz};
    if(ch==='E') enemySpawns.push({x:wx,z:wz});
    if(ch==='T') torchSpots.push({x:wx,z:wz});
  }
}
torchSpots.push({x:6,z:6},{x:30,z:30},{x:22,z:22},{x:10,z:34});

/* ---------- THREE SETUP ---------- */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x070502, 0.052);

const camera = new THREE.PerspectiveCamera(74, window.innerWidth/window.innerHeight, 0.1, 200);
camera.rotation.order = 'YXZ';
camera.position.set(playerStart.x, 1.7, playerStart.z);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------- TEXTURES (procedural) ---------- */
function makeStoneTexture(base, mortar, size, cellPx){
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext('2d');
  ctx.fillStyle = mortar;
  ctx.fillRect(0,0,size,size);
  for(let y=0;y<size;y+=cellPx){
    const offset = ((y/cellPx)%2===0)?0:cellPx/2;
    for(let x=-cellPx;x<size;x+=cellPx){
      const w = cellPx-3, h = cellPx-3;
      const shade = 0.75 + Math.random()*0.35;
      const c = shadeColor(base, shade);
      ctx.fillStyle = c;
      ctx.fillRect(x+offset+1.5, y+1.5, w, h);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.strokeRect(x+offset+1.5, y+1.5, w, h);
    }
  }
  for(let i=0;i<size*4;i++){
    ctx.fillStyle = 'rgba(0,0,0,'+(Math.random()*0.08)+')';
    ctx.fillRect(Math.random()*size, Math.random()*size, 2,2);
  }
  const tex = new THREE.CanvasTexture(cnv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
function shadeColor(hex, factor){
  const r = (hex>>16 & 255)*factor, g=(hex>>8 & 255)*factor, b=(hex & 255)*factor;
  return `rgb(${r|0},${g|0},${b|0})`;
}
const wallTex = makeStoneTexture(0x554a3a, '#241d15', 256, 42);
wallTex.repeat.set(1,1);
const floorTex = makeStoneTexture(0x3a3226, '#100c08', 256, 34);
floorTex.repeat.set(COLS*CELL/6, ROWS*CELL/6);
const ceilTex = makeStoneTexture(0x241d15, '#0a0704', 256, 50);
ceilTex.repeat.set(COLS*CELL/8, ROWS*CELL/8);

const wallMat = new THREE.MeshStandardMaterial({map:wallTex, roughness:0.95, metalness:0.02});
const floorMat = new THREE.MeshStandardMaterial({map:floorTex, roughness:1, metalness:0});
const ceilMat = new THREE.MeshStandardMaterial({map:ceilTex, roughness:1, side:THREE.BackSide});

/* ---------- BUILD MAZE ---------- */
const wallMeshes = [];
const wallGeo = new THREE.BoxGeometry(CELL, WALL_H, CELL);
for(let r=0;r<ROWS;r++){
  for(let c=0;c<COLS;c++){
    if(GRID[r][c]==='#'){
      const m = new THREE.Mesh(wallGeo, wallMat);
      m.position.set(c*CELL+CELL/2, WALL_H/2, r*CELL+CELL/2);
      m.userData.type='wall';
      scene.add(m);
      wallMeshes.push(m);
    }
  }
}
const mazeW = COLS*CELL, mazeD = ROWS*CELL;
const floor = new THREE.Mesh(new THREE.PlaneGeometry(mazeW, mazeD), floorMat);
floor.rotation.x = -Math.PI/2;
floor.position.set(mazeW/2, 0, mazeD/2);
scene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(mazeW, mazeD), ceilMat);
ceiling.rotation.x = Math.PI/2;
ceiling.position.set(mazeW/2, WALL_H, mazeD/2);
scene.add(ceiling);

/* ---------- LIGHTS / TORCHES ---------- */
scene.add(new THREE.AmbientLight(0x1a1812, 0.9));
scene.add(new THREE.HemisphereLight(0x2a2418, 0x050403, 0.35));

const torches = [];
function makeTorch(x,z){
  const grp = new THREE.Group();
  const poleMat = new THREE.MeshStandardMaterial({color:0x2b1c10, roughness:1});
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,0.9,6), poleMat);
  pole.position.y = 2.1;
  grp.add(pole);
  const flameMat = new THREE.MeshBasicMaterial({color:0xff9a3c});
  const flame = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8), flameMat);
  flame.position.y = 2.62;
  grp.add(flame);
  const light = new THREE.PointLight(0xff7d2e, 1.6, 11, 2);
  light.position.y = 2.62;
  grp.add(light);
  grp.position.set(x,0,z);
  scene.add(grp);
  torches.push({light, flame, phase:Math.random()*10, base:1.6});
}
torchSpots.forEach(t=>makeTorch(t.x,t.z));

const playerLight = new THREE.PointLight(0xffa25c, 0.55, 6, 2);
camera.add(playerLight);
playerLight.position.set(0,-0.2,0);
scene.add(camera);

/* ---------- ENEMIES ---------- */
const enemies = [];
const boneMat = new THREE.MeshStandardMaterial({color:0xcfc7a8, roughness:0.8});
const eyeMat = new THREE.MeshBasicMaterial({color:0xff2020});
const clothMat = new THREE.MeshStandardMaterial({color:0x4a1f1f, roughness:1});

function makeEnemy(x,z, hp, speed){
  const grp = new THREE.Group();
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.9,0.32), clothMat);
  torso.position.y = 1.0;
  grp.add(torso);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.26,10,10), boneMat);
  head.position.y = 1.65;
  grp.add(head);
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.045,6,6), eyeMat);
  eyeL.position.set(-0.09,1.66,0.22);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.09;
  grp.add(eyeL, eyeR);
  const armGeo = new THREE.BoxGeometry(0.14,0.7,0.14);
  const armL = new THREE.Mesh(armGeo, boneMat); armL.position.set(-0.36,0.95,0);
  const armR = new THREE.Mesh(armGeo, boneMat); armR.position.set(0.36,0.95,0);
  grp.add(armL, armR);
  const legGeo = new THREE.BoxGeometry(0.17,0.75,0.17);
  const legL = new THREE.Mesh(legGeo, boneMat); legL.position.set(-0.15,0.4,0);
  const legR = new THREE.Mesh(legGeo, boneMat); legR.position.set(0.15,0.4,0);
  grp.add(legL, legR);
  grp.position.set(x,0,z);
  scene.add(grp);
  const enemy = {
    group:grp, hp, maxHp:hp, speed, alive:true,
    attackCd:0, hitFlash:0, bobPhase:Math.random()*10,
    parts:{torso,head,eyeL,eyeR,armL,armR,legL,legR}
  };
  enemies.push(enemy);
  return enemy;
}

function tryMoveEntity(pos, dx, dz, radius){
  let nx = pos.x + dx, nz = pos.z + dz;
  const checks = [[radius,radius],[-radius,radius],[radius,-radius],[-radius,-radius]];
  let blockedX = checks.some(([ox,oz])=> isWallWorld(nx+ox, pos.z+oz));
  if(!blockedX) pos.x = nx;
  let blockedZ = checks.some(([ox,oz])=> isWallWorld(pos.x+ox, nz+oz));
  if(!blockedZ) pos.z = nz;
}

/* ---------- WAVES ---------- */
let wave = 0;
let score = 0;
let health = 100;
let gameActive = false;
let gameOver = false;

function spawnWave(n){
  wave = n;
  document.getElementById('waveVal').textContent = wave;
  const count = Math.min(3 + n, 12);
  const hp = 2 + Math.floor(n/2);
  const speed = 1.5 + n*0.08;
  for(let i=0;i<count;i++){
    const sp = enemySpawns[i % enemySpawns.length];
    const jx = (Math.random()-0.5)*1.6, jz = (Math.random()-0.5)*1.6;
    makeEnemy(sp.x+jx, sp.z+jz, hp, speed);
  }
  showWaveBanner('Horda ' + wave, count + ' esqueletos despertaram');
}

let waveBannerTimeout=null;
function showWaveBanner(text, sub){
  const el = document.getElementById('waveBanner');
  el.querySelector('.txt').textContent = text;
  el.querySelector('.sub').textContent = sub;
  el.classList.add('show');
  clearTimeout(waveBannerTimeout);
  waveBannerTimeout = setTimeout(()=>el.classList.remove('show'), 2200);
}

/* ---------- CONTROLS ---------- */
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.code]=true; });
window.addEventListener('keyup', e=>{ keys[e.code]=false; });

let yaw = 0, pitch = 0;
const SENS = 0.0022;
document.addEventListener('mousemove', e=>{
  if(document.pointerLockElement !== renderer.domElement) return;
  yaw -= e.movementX * SENS;
  pitch -= e.movementY * SENS;
  const lim = Math.PI/2 - 0.02;
  if(pitch>lim) pitch=lim;
  if(pitch<-lim) pitch=-lim;
  camera.rotation.set(pitch, yaw, 0, 'YXZ');
});

const startScreen = document.getElementById('startScreen');
const pauseScreen = document.getElementById('pauseScreen');
const gameOverScreen = document.getElementById('gameOverScreen');

function lockPointer(){ renderer.domElement.requestPointerLock(); }

document.getElementById('startBtn').addEventListener('click', ()=>{
  startScreen.classList.add('hidden');
  beginGame();
  lockPointer();
});
document.getElementById('resumeBtn').addEventListener('click', lockPointer);
document.getElementById('restartBtn').addEventListener('click', ()=>{
  restartGame();
  gameOverScreen.classList.add('hidden');
  lockPointer();
});

document.addEventListener('pointerlockchange', ()=>{
  if(document.pointerLockElement === renderer.domElement){
    pauseScreen.classList.add('hidden');
    gameActive = true;
  } else {
    gameActive = false;
    if(!gameOver && !startScreen.classList.contains('hidden')===false && wave>0){
      pauseScreen.classList.remove('hidden');
    }
  }
});

function beginGame(){
  gameOver = false;
  score = 0; health = 100;
  updateHUD();
  spawnWave(1);
}

function restartGame(){
  enemies.forEach(en=>scene.remove(en.group));
  enemies.length = 0;
  camera.position.set(playerStart.x, 1.7, playerStart.z);
  yaw = 0; pitch = 0;
  camera.rotation.set(0,0,0,'YXZ');
  beginGame();
}

/* ---------- SHOOTING ---------- */
const raycaster = new THREE.Raycaster();
let shootCooldown = 0;
const tracerMat = new THREE.LineBasicMaterial({color:0xffe0a0, transparent:true});
let activeTracers = [];

renderer.domElement.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  if(document.pointerLockElement !== renderer.domElement) return;
  if(gameOver) return;
  shoot();
});

function shoot(){
  if(shootCooldown>0) return;
  shootCooldown = 0.42;

  raycaster.setFromCamera({x:0,y:0}, camera);
  const targets = [];
  enemies.forEach(en=>{ if(en.alive) targets.push(en.parts.torso, en.parts.head); });
  const allTargets = targets.concat(wallMeshes);
  const hits = raycaster.intersectObjects(allTargets, false);

  let endPoint = camera.position.clone().add(raycaster.ray.direction.clone().multiplyScalar(30));
  if(hits.length>0){
    const hit = hits[0];
    endPoint = hit.point;
    const obj = hit.object;
    if(obj.userData && obj.userData.type==='wall'){
      // bolt lodges in stone
    } else {
      const en = enemies.find(e=> e.parts.torso===obj || e.parts.head===obj);
      if(en && en.alive) damageEnemy(en, obj===en.parts.head ? 2 : 1);
    }
  }
  spawnTracer(endPoint);
}

function spawnTracer(endPoint){
  const start = camera.position.clone().add(new THREE.Vector3(0,-0.05,0));
  const geo = new THREE.BufferGeometry().setFromPoints([start, endPoint]);
  const line = new THREE.Line(geo, tracerMat.clone());
  scene.add(line);
  activeTracers.push({line, life:0.09});
}

function damageEnemy(en, dmg){
  en.hp -= dmg;
  en.hitFlash = 0.15;
  if(en.hp<=0 && en.alive){
    en.alive = false;
    score += 100;
    updateHUD();
    scene.remove(en.group);
  }
}

/* ---------- HUD ---------- */
function updateHUD(){
  const hb = document.getElementById('healthBarInner');
  const ht = document.getElementById('healthText');
  const hp = Math.max(0, Math.round(health));
  hb.style.width = hp + '%';
  ht.textContent = hp;
  document.getElementById('healthWrap').classList.toggle('critical', hp>0 && hp<=25);
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('waveVal').textContent = wave;
}

function hitFlashScreen(){
  const el = document.getElementById('hitflash');
  el.style.background = 'rgba(140,10,10,0.42)';
  setTimeout(()=>{ el.style.background='rgba(140,10,10,0.0)'; }, 130);
}

function endGame(){
  gameOver = true;
  gameActive = false;
  document.exitPointerLock();
  document.getElementById('finalStats').textContent =
    'Pontos finais: ' + score + ' | Horda alcançada: ' + wave;
  gameOverScreen.classList.remove('hidden');
}

/* ---------- MAIN LOOP ---------- */
const MOVE_SPEED = 4.2;
const clock = new THREE.Clock();

function updatePlayer(dt){
  const forward = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,yaw,0));
  const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0,yaw,0));
  let mx=0, mz=0;
  if(keys['KeyW']){ mx+=forward.x; mz+=forward.z; }
  if(keys['KeyS']){ mx-=forward.x; mz-=forward.z; }
  if(keys['KeyA']){ mx-=right.x; mz-=right.z; }
  if(keys['KeyD']){ mx+=right.x; mz+=right.z; }
  const len = Math.hypot(mx,mz);
  if(len>0){ mx/=len; mz/=len; }
  const dx = mx*MOVE_SPEED*dt, dz = mz*MOVE_SPEED*dt;
  const pos = {x:camera.position.x, z:camera.position.z};
  tryMoveEntity(pos, dx, dz, 0.35);
  camera.position.x = pos.x;
  camera.position.z = pos.z;
}

function updateEnemies(dt, t){
  let allDead = enemies.length>0 && enemies.every(e=>!e.alive);
  for(const en of enemies){
    if(!en.alive) continue;
    const g = en.group;
    g.position.y = Math.sin(t*4 + en.bobPhase)*0.03;

    const dx = camera.position.x - g.position.x;
    const dz = camera.position.z - g.position.z;
    const dist = Math.hypot(dx,dz);
    g.rotation.y = Math.atan2(dx,dz);

    if(dist > 1.3){
      const speed = en.speed;
      const pos = {x:g.position.x, z:g.position.z};
      tryMoveEntity(pos, (dx/dist)*speed*dt, (dz/dist)*speed*dt, 0.35);
      g.position.x = pos.x; g.position.z = pos.z;
    } else if(!gameOver){
      en.attackCd -= dt;
      if(en.attackCd<=0){
        en.attackCd = 1.0;
        health -= 9;
        hitFlashScreen();
        updateHUD();
        if(health<=0){ health=0; updateHUD(); endGame(); }
      }
    }

    if(en.hitFlash>0){
      en.hitFlash -= dt;
      const c = en.hitFlash>0 ? 0xff3030 : 0x4a1f1f;
      en.parts.torso.material = en.parts.torso.material;
      en.parts.torso.material.color.setHex(en.hitFlash>0?0xff5050:0x4a1f1f);
    }
  }
  if(allDead && !gameOver && gameActive){
    enemies.length = 0;
    setTimeout(()=>{ if(!gameOver) spawnWave(wave+1); }, 900);
  }
}

function updateTorches(t){
  torches.forEach(tr=>{
    const flicker = Math.sin(t*9+tr.phase)*0.25 + Math.sin(t*3.3+tr.phase)*0.15 + (Math.random()-0.5)*0.25;
    tr.light.intensity = Math.max(0.4, tr.base + flicker);
  });
}

function updateTracers(dt){
  activeTracers = activeTracers.filter(tr=>{
    tr.life -= dt;
    tr.line.material.opacity = Math.max(0, tr.life/0.09);
    if(tr.life<=0){ scene.remove(tr.line); return false; }
    return true;
  });
}

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  if(shootCooldown>0) shootCooldown -= dt;
  updateTorches(t);
  updateTracers(dt);

  if(gameActive && !gameOver){
    updatePlayer(dt);
    updateEnemies(dt, t);
  } else if(!gameOver){
    updateEnemies(0, t);
  }

  renderer.render(scene, camera);
}
animate();

})();
</script>
